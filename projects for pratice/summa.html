<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       
          #hehe{
              margin-top:20px;
              height:40px;
              width:100px;
              background-color:purple;
              color:white;
              padding:3px;
              border-radius:10px;
              font-weight: bolder;
              font-size:20px;
              box-shadow:2px 2px 20px orange;
          }
          #hehe:hover{
              background-color:white;
              color:purple;
              box-shadow: 0px 0px 40px purple;
          }
          .outerbox{
              display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background: linear-gradient(
        135deg,
        #ff6b6b 0%,
        #feca57 10%,
        #48dbfb 20%,
        #1dd1a1 30%,
        #5f27cd 40%,
        #c8d6e5 50%,
        #ff9ff3 60%,
        #54a0ff 70%,
        #00d2d3 80%,
        #ff9f43 90%,
        #ee5253 100%
    );

          }
          .box{
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            border-radius:25px;
            padding:30px;
            background-color:rgb(245, 214, 232);
            opacity:0.54;
          }
          input[name="gender"]+label{
             font-weight: bold;
             color:purple;
             font-size:20px;
          }
          .box:hover{
             opacity:0.87;
          }
         
    </style>
</head>
    <body>
        <div class="outerbox">
       <div class="box">
      <h1 id="hello" style="color:purple;padding:10px">My First Pratice</h1>
      <div>
      <label for="inp" style="color:purple;font-size:20px;font-weight:bolder;">Name:</label>
      <input id="inp" type="input" style="border-radius:20px;margin-bottom:10px">
      </div>
      <br>
       <div>
       <input type="radio" id="1" name="gender" value="male">
       <label for="1">Male</label>
      <input type="radio"  id="2" name="gender" value="female">
       <label for="2">Female</label>
       </div>
      <div class="pratice1">
        <button id="hehe">Submit</button>
        <ul id="add"></ul>
      </div>
     </div>
    </div>
    <script>
         const div=document.querySelector(".pratice1")
         const first=document.querySelector("#hello");
         const button=document.querySelector("#hehe");
         const add=document.querySelector("#add")
         const li=document.createElement("li");
         const p=document.createElement("p");
         const inp=document.querySelector("#inp")
         button.addEventListener("click",()=>{
              li.innerText=inp.value;
              if(inp.value!=""){
              add.append(li);
              }
              const selected=document.querySelector("input[name='gender']:checked")
              p.innerHTML=`<b style="color:purple">${inp.value}</b> is a ${selected.value}`;
              div.append(p);
         })
    </script>
     </body>
</html>
